name: web-ci

on:
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/**'
      - '.github/copilot-instructions.md'
      - 'scripts/Invoke-BackendPrisma.ps1'
      - 'scripts/Launch-WebApp.ps1'
      - 'scripts/Setup-WebWorkspace.ps1'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh
    working-directory: web

jobs:
  lint:
    name: web-lint
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @schedulesync/backend db:generate

      - name: Lint
        run: pnpm lint

  test:
    name: web-test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @schedulesync/backend db:generate

      - name: Test
        run: pnpm test

  build:
    name: web-build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @schedulesync/backend db:generate

      - name: Build
        run: pnpm build
